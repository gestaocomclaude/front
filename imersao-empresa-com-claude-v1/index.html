<!doctype html>
<html lang="pt-BR">
  <head>
    <script async src="https://www.googletagmanager.com/gtm.js?id=GTM-5SJWHNCX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empresa com Claude | Redirecionando</title>
    <meta name="robots" content="noindex" />
    <meta name="description" content="Roteador de versões da página Empresa com Claude." />
    <link rel="icon" type="image/svg+xml" href="/assets/brand/claude-logo.svg" />
    <script>
      (function routeVariant() {
        var variants = ["v2", "v3", "v4", "v5"];
        var storageKey = "ecc_imersao_final_variant";
        var cookieName = "ecc_imersao_final_variant";
        var params = new URLSearchParams(window.location.search);
        var requested = params.get("variant");
        var stored = null;
        var cookieVariant = null;
        var source = "random";

        function getCookie(name) {
          var prefix = name + "=";
          return document.cookie
            .split(";")
            .map(function (value) { return value.trim(); })
            .filter(function (value) { return value.indexOf(prefix) === 0; })
            .map(function (value) { return decodeURIComponent(value.slice(prefix.length)); })[0] || null;
        }

        function setCookie(name, value) {
          var maxAge = 60 * 60 * 24 * 180;
          document.cookie = name + "=" + encodeURIComponent(value) + "; Path=/; Max-Age=" + maxAge + "; SameSite=Lax";
        }

        try {
          stored = window.localStorage.getItem(storageKey);
        } catch (error) {
          stored = null;
        }

        try {
          cookieVariant = getCookie(cookieName);
        } catch (error) {
          cookieVariant = null;
        }

        var variant = null;

        if (variants.includes(requested)) {
          variant = requested;
          source = "requested";
        } else if (variants.includes(stored)) {
          variant = stored;
          source = "localStorage";
        } else if (variants.includes(cookieVariant)) {
          variant = cookieVariant;
          source = "cookie";
        }

        if (!variants.includes(variant)) {
          variant = variants[Math.floor(Math.random() * variants.length)];
        }

        try {
          window.localStorage.setItem(storageKey, variant);
        } catch (error) {}

        try {
          setCookie(cookieName, variant);
        } catch (error) {}

        params.set("routed_from", "v1");
        params.set("variant", variant);
        params.set("variant_source", source);

        window.location.replace(
          "/imersao-empresa-com-claude-" + variant + "/" + (params.toString() ? "?" + params.toString() : "")
        );
      })();
    </script>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #f2e4cd;
        color: #291a12;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      p {
        max-width: 420px;
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.4;
        text-align: center;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <p>Redirecionando para a melhor versão da página. <a href="/imersao-empresa-com-claude-v2/">Continuar</a></p>
  </body>
</html>
